<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Pit Stop</title>
  <link rel="stylesheet" href="historico.css" />
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <img src="pitstop.png" class="logo">

    <nav>
      <a onclick="irParaDashboard()">Dashboard</a>
      <a onclick="irParaVeiculos()">Veículos</a>
      <a onclick="irParaCaixa()">Caixa</a>
      <a class="active">Histórico</a>
    </nav>
  </aside>

  <!-- CONTEÚDO -->
  <main class="content">

    <header class="topbar">
      <div>
        <h1>Histórico de Caixa</h1>
        <p>Acompanhe os fechamentos realizados</p>
      </div>
      <button class="btn-exit" onclick="logout()">Sair</button>
    </header>

    <!-- CARDS -->
    <section class="cards">
      <div class="card">
        <span>Entradas</span>
        <strong id="totalEntradas">R$ 0,00</strong>
      </div>

      <div class="card red">
        <span>Saídas</span>
        <strong id="totalSaidas">R$ 0,00</strong>
      </div>

      <div class="card green">
        <span>Saldo</span>
        <strong id="saldoTotal">R$ 0,00</strong>
      </div>

      <div class="card blue">
        <span>Fechamentos</span>
        <strong id="totalFechamentos"></strong>
      </div>
    </section>

    <!-- TABELA -->
    <section class="table">

      <div class="table-head">
        <span>Data</span>
        <span>Entradas</span>
        <span>Saídas</span>
        <span>Saldo</span>
        <span>Ações</span>
      </div>

      <div id="historicoLista" class="table-body"></div>

    </section>

  </main>

</div>
