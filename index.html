<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Pit Stop</title>
  <link rel="stylesheet" href="style.cssv=2?" />
</head>
<body>

  <div class="container">

    <!-- LADO ESQUERDO (IMAGEM) -->
    <div class="left-side"></div>

    <!-- LADO DIREITO (LOGIN) -->
    <div class="right-side">
      <div class="login-box">

        <h2>Bem-vindo!</h2>
        <p>Acesse o sistema do Lava Rápido Pit Stop</p>

        <form id="loginForm">

          <label>Usuário</label>
          <input type="text" placeholder="Digite seu usuário" required />

          <label>Senha</label>
          <input type="password" placeholder="Digite sua senha" required />

          <div class="options">
            <input type="checkbox" />
            <span>Lembrar de mim</span>
          </div>

          <button type="submit">ENTRAR NO SISTEMA</button>

        </form>

        <a href="#">Esqueci minha senha</a>

        <small>© 2025 Lava Rápido Pit Stop</small>

      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
