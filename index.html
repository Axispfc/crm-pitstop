<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Pit Stop</title>
  <link rel="stylesheet" href="style.css?v=6" />
</head>
<body>

<!-- LOGIN -->
<section id="loginScreen" class="container">
  <div class="left-side"></div>
  <div class="right-side">
    <div class="login-box">
      <h2>Bem-vindo!</h2>
      <form id="loginForm">
        <input type="email" placeholder="Email" required />
        <input type="password" placeholder="Senha" required />
        <button type="submit">Entrar</button>
      </form>
    </div>
  </div>
</section>





<script type="module">
  // Import Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBBZ5ASFYLuFNB-sDQLZMIYqO5btdZGMGg",
    authDomain: "crm-pitstop.firebaseapp.com",
    projectId: "crm-pitstop",
    storageBucket: "crm-pitstop.firebasestorage.app",
    messagingSenderId: "216473066500",
    appId: "1:216473066500:web:f67c0541cb5a1bbe8edc41",
    measurementId: "G-9R569LYB6K"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // LOGIN
  const loginForm = document.getElementById("loginForm");

  loginForm.addEventListener("submit", function (e) {
    e.preventDefault();

    const email = e.target[0].value;
    const senha = e.target[1].value;

    signInWithEmailAndPassword(auth, email, senha)
      .then((userCredential) => {
        // Login OK
        window.location.href = "dashboard.html";
      })
      .catch((error) => {
        alert("Erro no login: " + error.message);
      });
  });
</script>

</body>
</html>
