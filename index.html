          <div class="login-box">
          <h2>Bem-Vindo!</h2>
            <form><label>Email</label>
            <input type="email" name="email" id="email" placeholder="seu@email.com" onchange="onChangeEmail()"/>
            <div id="email-required-error" style="display:none">
             O email é obrigatório
            </div>

            <div id="email-invalid-error" style="display:none">
            O email é inválido
            </div>
            
            <div><label>Senha</label></div>
            <input type="password" name="password" id="password" placeholder="Senha" onchange="onChangePassword()"/>
            
            <div id="password-required-error" style="display:none">
            A senha é obrigatória
            </div>
       
            
        
            <button type="button"  id="login-button"  onclick="login()">Entrar</button>
            </form>
          </div>
        </div>
