<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Pit Stop</title>
  <link rel="stylesheet" href="style.css?v=6" />
</head>
<body>

<!-- LOGIN -->
<section id="loginScreen" class="container">
  <div class="left-side"></div>
  <div class="right-side">
    <div class="login-box">
      <h2>Bem-vindo!</h2>
      <form id="loginForm">
        <input type="text" placeholder="Usuário" required />
        <input type="password" placeholder="Senha" required />
        <button type="submit">Entrar</button>
      </form>
    </div>
  </div>
</section>

<!-- SISTEMA -->
<section id="systemScreen" class="system hidden">

  <aside class="sidebar">
    <h2>Pit Stop</h2>
    <nav>
      <a class="active">Cadastro</a>
      <a>Fila</a>
      <a>Caixa</a>
    </nav>
  </aside>

  <main class="content">

    <header class="topbar">
      <h2>Cadastro de Veículos</h2>
      <button class="btn-exit" id="logoutBtn">Sair</button>
    </header>

    <div class="grid">

      <!-- FORM -->
      <section class="panel">
        <h3>Entrada</h3>

        <form id="vehicleForm">
          <input id="nome" placeholder="Cliente" required />
          <input id="veiculo" placeholder="Veículo" required />
          <input id="placa" placeholder="Placa" required />
          <input id="telefone" placeholder="Telefone" required />

          <h4>Tipo</h4>

          <div class="choice-row">
            <label class="choice">
              <input type="radio" name="tipoEntrada" value="Estacionamento" checked />
              Estacionamento
            </label>

            <label class="choice">
              <input type="radio" name="tipoEntrada" value="Lavagem" />
              Lavagem
            </label>
          </div>

          <!-- LAVAGEM -->
          <div id="washOptions" class="hidden">

            <h4>Tipo de veículo</h4>

            <div class="choice-row">
              <label class="choice">
                <input type="radio" name="tipoVeiculo" value="Hatch" />
                Hatch
              </label>

              <label class="choice">
                <input type="radio" name="tipoVeiculo" value="Sedan" />
                Sedan
              </label>

              <label class="choice">
                <input type="radio" name="tipoVeiculo" value="SUV" />
                SUV
              </label>

              <label class="choice">
                <input type="radio" name="tipoVeiculo" value="Moto" />
                Moto
              </label>
            </div>

            <h4>Serviço</h4>

            <select id="servico">
              <option value="">Selecione</option>
              <option>Lavagem completa</option>
              <option>Lavagem rápida</option>
              <option>Ducha com secagem</option>
            </select>

            <label class="choice">
              <input type="checkbox" id="cera" />
              Adicionar cera (+R$10)
            </label>

          </div>

          <button class="btn-register" type="submit">Cadastrar</button>

        </form>
      </section>

      <!-- LISTA ESTACIONAMENTO -->
      <section class="panel">
        <h3>Veículos Estacionados</h3>
        <div id="listaEstacionamento"></div>
      </section>

      <!-- CUPOM -->
      <section id="coupon" class="coupon hidden">
        <h3>Comanda</h3>
        <div id="cupomConteudo"></div>
        <button onclick="window.print()">Imprimir</button>
      </section>

    </div>

  </main>

</section>

<script src="script.js?v=7"></script>

</body>
</html>
