<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Pit Stop</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>



<!-- SISTEMA -->
<section id="systemScreen" class="container">

  <aside class="sidebar">
    <img src="pitstop.png" alt="Logo Pit Stop" class="logo" />
    <nav>
      <a class="active">Dashboard</a>
      <a onclick="irParaVeiculos()">Veiculos Estacionados</a>
      <a onclick="irParaCaixa()">Caixa</a>
      <a onclick="irParaHistorico()">Histórico</a>
      
    </nav>
  </aside>

  <main class="content">

    <header class="topbar">
      <h2>Cadastro de Veículos</h2>
      <button class="btn-exit" id="logoutBtn" onclick="logout()">Sair</button>
    </header>

    <div class="grid">

      <!-- FORM -->
      <section class="panel">
        <h3>Entrada</h3>

        <form id="vehicleForm">
          <input id="nome" placeholder="Cliente" required />
          <input id="veiculo" placeholder="Veículo" required />
          <input id="placa" placeholder="Placa" required />
          <input id="telefone" placeholder="Telefone" required />
          

          <h4>Tipo</h4>

          <div class="choice-row">
            <label class="choice">
              <input type="radio" name="tipoEntrada" value="Estacionamento" checked />
              Estacionamento
            </label>

            <label class="choice">
              <input type="radio" name="tipoEntrada" value="Lavagem" />
              Lavagem
            </label>
          </div>

          <!-- LAVAGEM -->
          <div id="washOptions" class="hidden">

            <h4>Tipo de veículo</h4>

            <div class="choice-row">
              <label class="choice">
                <input type="radio" name="tipoVeiculo" value="Hatch" />
                Hatch
              </label>

              <label class="choice">
                <input type="radio" name="tipoVeiculo" value="Sedan" />
                Sedan
              </label>

              <label class="choice">
                <input type="radio" name="tipoVeiculo" value="SUV" />
                SUV
              </label>

              <label class="choice">
                <input type="radio" name="tipoVeiculo" value="Moto" />
                Moto
              </label>

              <label class="choice">
                <input type="radio" name="tipoVeiculo" value="Caminhonete" />
                Caminhonete
              </label>
            </div>

            <h4>Serviço</h4>

            <select class="form-control" id="servico">
              <option class="control"value="">Selecione</option>
            <option class="control">Lavagem completa</option>
              <option class="control">Lavagem rápida</option>
              <option class="control">Ducha com secagem</option>
            </select>

          </div>

            <label class="choicec">
              <input type="checkbox" name="servicoAdicional" value="cera" />
               Cera (R$10)
            </label>

          </div>

          <h4>Forma de pagamento</h4>

            <select id="pagamento">
            <option value="">Selecione</option>
            <option>Dinheiro</option>
            <option>Pix</option>
            <option>Débito</option>
           <option>Crédito</option>
</select>

          <button class="btn-register" type="submit">Cadastrar</button>

        </form>
      </section>

      <div class="table">

  <div class="table-header">
    <span>Placa</span>
    <span>Veículo</span>
    <span>Cliente</span>
    <span>Tipo</span>
    <span id="{veiculo.id}">Tempo</span>
    <span>Status</span>
   
    
  </div>

  <div id="listaEstacionamento"></div>

</div>
   
     <section id="coupon" class="coupon hidden">
  <div class="coupon-box">
    <h3>Comanda</h3>
    <div id="cupomConteudo"></div>

    <p>
      Rua Mauá, 123 - São Paulo/SP <br>
      CNPJ: 12.345.678/0001-90
    </p>

    <button onclick="window.print()">Imprimir</button>
    <button onclick="fecharCupom()">Fechar</button>
  </div>
</section>

</body>
</html>
